name: "code quality"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - ".github/workflows/code-quality.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - ".github/workflows/code-quality.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # format:check runs `cargo fmt -- --check` next to prettier
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check translation consistency
        run: bun run check:translations

      - name: Run ESLint
        run: bun run lint

      - name: Check formatting (prettier + cargo fmt)
        run: bun run format:check
