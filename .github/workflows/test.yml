name: "test"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "src-tauri/**"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libvulkan-dev + glslc + spirv-headers are needed to build the
          # whisper-vulkan feature of transcribe-rs/whisper-rs on Linux.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libasound2-dev libssl-dev libgtk-layer-shell-dev \
            libvulkan-dev glslc spirv-headers

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # The Silero VAD model ships with the repo (src-tauri/resources/models/),
      # so no download step is needed.

      # Warnings are reported but do not fail the job yet; tighten to
      # `-D warnings` once the existing codebase is clippy-clean.
      - name: Run cargo clippy
        working-directory: src-tauri
        run: cargo clippy

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test
